<div class="crop-card">
  <div class="crop-header">
    <div class="crop-type">
      <span class="material-icons">grass</span>
      <span class="type-label">{{ crop.getType() }}</span>
    </div>
    <span class="crop-status-badge crop-status-{{ crop.getStatus().toLowerCase() }}">
      {{ crop.getStatus() }}
    </span>
  </div>

  <div class="crop-meta">
    <div class="meta-item">
      <span class="meta-label">Siembra</span>
      <span class="meta-value">{{ formatDate(crop.getSowingDate()) }}</span>
    </div>
    @if (crop.getHarvestDate()) {
      <div class="meta-item">
        <span class="meta-label">Cosecha</span>
        <span class="meta-value">{{ formatDate(crop.getHarvestDate()) }}</span>
      </div>
    }
  </div>

  <div class="crop-actions">
    <button class="icon-btn edit-btn" title="Edit" (click)="editCrop.emit(crop)">
      <span class="material-icons">edit</span>
    </button>
    @if (crop.isActive()) {
      <button class="icon-btn harvest-btn" title="Harvest" (click)="harvestCrop.emit(crop.getId())">
        <span class="material-icons">agriculture</span>
      </button>
    }
    <button class="icon-btn delete-btn" title="Delete" (click)="deleteCrop.emit(crop.getId())">
      <span class="material-icons">delete</span>
    </button>
  </div>
</div>
