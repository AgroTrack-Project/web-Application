<div class="alerts-wrapper">

  <h1>ALERTAS CLIMÁTICAS</h1>

  <div *ngIf="store.loading()" class="loading-state">
    Cargando alertas...
  </div>

  <ng-container *ngIf="!store.loading()">

    <div *ngIf="userPlots().length === 0" class="empty-alerts">
      No tienes parcelas registradas para monitorear.
    </div>

    <ng-container *ngIf="userPlots().length > 0">

      <div class="alerts-total">
        TOTAL: {{ store.alerts().length }}
      </div>

      <div *ngIf="store.alerts().length === 0" class="empty-alerts">
        No hay alertas para tus parcelas.
      </div>

      <div *ngIf="store.alerts().length > 0" class="alerts-container">

        <div *ngFor="let alert of store.alerts()" class="alert-card">

          <h2>{{ alert.title }}</h2>

          <p class="alert-plot-name">
            Parcela: {{ getPlotNames(alert.city) }}
          </p>

          <p>{{ alert.message }}</p>

          <span class="alert-city">{{ alert.city }}</span>

        </div>

      </div>

    </ng-container>

  </ng-container>

</div>
